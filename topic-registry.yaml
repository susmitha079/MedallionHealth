# Kafka Topic Configuration
# MedallionHealth – All topics with production-grade settings

# ============================================================
# TOPIC NAMING CONVENTION
# {domain}.{entity}.{event_type}.v{version}
# Partition key: tenant_id (50 partitions = 1 per hospital)
# ============================================================

---
# IDENTITY DOMAIN
---
topic: identity.patient.registered.v1
config:
  partitions: 50
  replication_factor: 3
  retention_ms: 2592000000        # 30 days
  cleanup_policy: delete
  min_insync_replicas: 2
  compression_type: lz4
  schema_subject: identity.patient.registered-value
  partition_key: tenant_id
  consumer_groups:
    - clinical-admission-service
    - scheduling-appointment-service
    - billing-service
    - audit-consumer
    - bronze-ingestion-patient

---
