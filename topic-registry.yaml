topic: operations.bed.status_changed.v1
config:
  partitions: 50
  replication_factor: 3
  retention_ms: 604800000         # 7 days (high-frequency, use compaction for current state)
  cleanup_policy: compact,delete
  min_insync_replicas: 2
  compression_type: lz4
  partition_key: tenant_id
  message_key: "{tenant_id}#{bed_id}"  # compact on bed_id within tenant
  consumer_groups:
    - clinical-admission-service
    - audit-consumer
    - bronze-ingestion-bed
