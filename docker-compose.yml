version: "3.9"

# ============================================================
# MedallionHealth – Local Development Stack
# Simulates the AWS MSK + supporting services locally
# Usage: make docker-up
# ============================================================

name: medallionhealth

networks:
  medallion-net:
    driver: bridge

volumes:
  postgres_data:
  zookeeper_data:
  kafka_data:
  airflow_logs:
  airflow_db:

services:

  # ── Zookeeper (Kafka dependency) ──────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: mh-zookeeper
    networks: [medallion-net]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Kafka Broker ──────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: mh-kafka
    networks: [medallion-net]
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"       # External (host) access
      - "9093:9093"       # Internal (container) access
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: EXTERNAL:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: EXTERNAL://localhost:9092,INTERNAL://kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"   # Enforce topic registry
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1         # 1 for local (3 in AWS MSK)
      KAFKA_NUM_PARTITIONS: 50
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_COMPRESSION_TYPE: lz4
      KAFKA_MESSAGE_MAX_BYTES: 10485760            # 10MB max message
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── Schema Registry ───────────────────────────────────────
  schema-registry:
    image: confluentinc/cp-schema-registry:7.5.0
    container_name: mh-schema-registry
    networks: [medallion-net]
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:9093
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_KAFKASTORE_TOPIC: _schemas
      SCHEMA_REGISTRY_SCHEMA_COMPATIBILITY_LEVEL: BACKWARD
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/subjects"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Kafka UI (Provectus) ──────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: mh-kafka-ui
    networks: [medallion-net]
    depends_on: [kafka, schema-registry]
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: medallionhealth-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9093
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081
      KAFKA_CLUSTERS_0_METRICS_PORT: 9997
      DYNAMIC_CONFIG_ENABLED: "true"

  # ── PostgreSQL (operational DB for all Spring Boot services) ─
  postgres:
    image: postgres:16-alpine
    container_name: mh-postgres
    networks: [medallion-net]
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: medallion
      POSTGRES_PASSWORD: medallion_dev_secret
      POSTGRES_MULTIPLE_DATABASES: |
        patient_db,appointment_db,bed_mgmt_db,billing_db,audit_db,airflow_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medallion"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO (Local S3 simulation) ───────────────────────────
  minio:
    image: minio/minio:latest
    container_name: mh-minio
    networks: [medallion-net]
    ports:
      - "9000:9000"       # S3 API
      - "9001:9001"       # Console UI
    environment:
      MINIO_ROOT_USER: medallion
      MINIO_ROOT_PASSWORD: medallion_minio_secret
    command: server /data --console-address ":9001"
    volumes:
      - ./data/minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── MinIO Bucket Setup ────────────────────────────────────
  minio-setup:
    image: minio/mc:latest
    container_name: mh-minio-setup
    networks: [medallion-net]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 medallion medallion_minio_secret;
      mc mb local/medallionhealth-bronze-local --ignore-existing;
      mc mb local/medallionhealth-silver-local --ignore-existing;
      mc mb local/medallionhealth-gold-local --ignore-existing;
      mc mb local/medallionhealth-ml-models-local --ignore-existing;
      echo 'Buckets created';
      "
    restart: on-failure

  # ── Apache Airflow ────────────────────────────────────────
  airflow-db:
    image: postgres:16-alpine
    container_name: mh-airflow-db
    networks: [medallion-net]
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow_secret
      POSTGRES_DB: airflow
    volumes:
      - airflow_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      retries: 5

  airflow-init:
    image: apache/airflow:2.8.0-python3.11
    container_name: mh-airflow-init
    networks: [medallion-net]
    depends_on:
      airflow-db:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow_secret@airflow-db/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    volumes:
      - ./data-platform/orchestration/airflow/dags:/opt/airflow/dags
      - ./data-platform/orchestration/airflow/plugins:/opt/airflow/plugins
      - airflow_logs:/opt/airflow/logs
    command: >
      bash -c "
        airflow db init &&
        airflow users create
          --username admin
          --password admin
          --firstname Medallion
          --lastname Admin
          --role Admin
          --email admin@medallionhealth.local
      "
    restart: on-failure

  airflow-webserver:
    image: apache/airflow:2.8.0-python3.11
    container_name: mh-airflow-webserver
    networks: [medallion-net]
    depends_on: [airflow-init]
    ports:
      - "8888:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow_secret@airflow-db/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: medallion_webserver_secret
    volumes:
      - ./data-platform/orchestration/airflow/dags:/opt/airflow/dags
      - ./data-platform/orchestration/airflow/plugins:/opt/airflow/plugins
      - airflow_logs:/opt/airflow/logs
    command: webserver
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      retries: 5

  airflow-scheduler:
    image: apache/airflow:2.8.0-python3.11
    container_name: mh-airflow-scheduler
    networks: [medallion-net]
    depends_on: [airflow-init]
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow_secret@airflow-db/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    volumes:
      - ./data-platform/orchestration/airflow/dags:/opt/airflow/dags
      - ./data-platform/orchestration/airflow/plugins:/opt/airflow/plugins
      - airflow_logs:/opt/airflow/logs
    command: scheduler

  # ── Data Generator API ────────────────────────────────────
  data-generator:
    build:
      context: ./data-generator
      dockerfile: Dockerfile
    container_name: mh-data-generator
    networks: [medallion-net]
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    ports:
      - "8090:8090"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9093
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      GENERATOR_DEFAULT_RATE: 50
      GENERATOR_HOSPITALS: 50
    volumes:
      - ./data-generator/src:/app/src

  # ── Patient Service ───────────────────────────────────────
  patient-service:
    build:
      context: ./services/patient-service
      dockerfile: Dockerfile
    container_name: mh-patient-service
    networks: [medallion-net]
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8101:8080"
    environment:
      SPRING_PROFILES_ACTIVE: local
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/patient_db
      SPRING_DATASOURCE_USERNAME: medallion
      SPRING_DATASOURCE_PASSWORD: medallion_dev_secret
      KAFKA_BOOTSTRAP_SERVERS: kafka:9093
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      retries: 5

  # ── Appointment Service ───────────────────────────────────
  appointment-service:
    build:
      context: ./services/appointment-service
      dockerfile: Dockerfile
    container_name: mh-appointment-service
    networks: [medallion-net]
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8102:8080"
    environment:
      SPRING_PROFILES_ACTIVE: local
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/appointment_db
      SPRING_DATASOURCE_USERNAME: medallion
      SPRING_DATASOURCE_PASSWORD: medallion_dev_secret
      KAFKA_BOOTSTRAP_SERVERS: kafka:9093
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      PATIENT_SERVICE_URL: http://patient-service:8080

  # ── Bed Management Service ────────────────────────────────
  bed-management-service:
    build:
      context: ./services/bed-management-service
      dockerfile: Dockerfile
    container_name: mh-bed-management-service
    networks: [medallion-net]
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8103:8080"
    environment:
      SPRING_PROFILES_ACTIVE: local
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/bed_mgmt_db
      SPRING_DATASOURCE_USERNAME: medallion
      SPRING_DATASOURCE_PASSWORD: medallion_dev_secret
      KAFKA_BOOTSTRAP_SERVERS: kafka:9093

  # ── ML Serving API ────────────────────────────────────────
  ml-serving:
    build:
      context: ./ml/serving
      dockerfile: Dockerfile
    container_name: mh-ml-serving
    networks: [medallion-net]
    ports:
      - "8001:8001"
    environment:
      MODEL_BUCKET: medallionhealth-ml-models-local
      AWS_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: medallion
      AWS_SECRET_ACCESS_KEY: medallion_minio_secret
    volumes:
      - ./ml/serving/src:/app/src

  # ── LLM Assistant API ─────────────────────────────────────
  llm-assistant:
    build:
      context: ./llm/healthcare-assistant
      dockerfile: Dockerfile
    container_name: mh-llm-assistant
    networks: [medallion-net]
    ports:
      - "8002:8002"
    environment:
      REDSHIFT_HOST: ${REDSHIFT_HOST:-localhost}
      REDSHIFT_PORT: "5439"
      REDSHIFT_DB: medallionhealth
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ML_SERVING_URL: http://ml-serving:8001
    volumes:
      - ./llm/healthcare-assistant/src:/app/src
